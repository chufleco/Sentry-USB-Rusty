# Cross-compilation targets for Raspberry Pi.
#
# Linker config is per-target here. The target-cpu tuning is a SAFE DEFAULT
# for local dev cross-builds (cortex-a72 on aarch64 — runs everywhere from
# Pi 3 through Pi 5; cortex-a7 on armv7 — runs on every Pi 2+). CI builds
# the release matrix override these defaults via the RUSTFLAGS env var to
# produce per-CPU-tuned variants (a53/a72/a76 for aarch64). The runtime
# picker script (sentryusb-pick-binary) chooses the right variant at boot.
#
# DO NOT add target-feature flags here without auditing each enabled
# feature for cross-SoC compatibility — the local-dev default must keep
# running on every Pi in the supported set.

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
rustflags = ["-C", "target-cpu=cortex-a72"]

[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"
rustflags = ["-C", "target-cpu=cortex-a7"]
