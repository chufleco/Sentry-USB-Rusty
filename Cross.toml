# Cross-compilation config for the BLE crates (tesla_ble / tesla_telemetry).
# btleplug pulls libdbus-sys, which links the system libdbus and probes it via
# pkg-config. The stock cross image lacks the arm64 dbus dev lib, so install it
# (+ pkg-config) into the build container and allow cross pkg-config.
[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    "apt-get install --assume-yes --no-install-recommends libdbus-1-dev:arm64 pkg-config",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = ["PKG_CONFIG_ALLOW_CROSS=1"]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture armhf",
    "apt-get update",
    "apt-get install --assume-yes --no-install-recommends libdbus-1-dev:armhf pkg-config",
]

[target.armv7-unknown-linux-gnueabihf.env]
passthrough = ["PKG_CONFIG_ALLOW_CROSS=1"]
