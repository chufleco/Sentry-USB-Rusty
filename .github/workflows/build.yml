name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    # Pin to 22.04 (glibc 2.35). `ubuntu-latest` now points at 24.04
    # (glibc 2.39) and Pi OS Bookworm only ships glibc 2.36 — anything
    # built on 24.04 fails on every Pi with:
    #   /lib/.../libc.so.6: version `GLIBC_2.39' not found
    # When 22.04 is eventually retired by GitHub, switch to a
    # cargo-zigbuild or container-based build for explicit ABI control.
    #
    # aarch64 jobs run on `ubuntu-22.04-arm` (native arm64, ~10-15% faster
    # link + no cross-toolchain to install). 32-bit ARM jobs stay on
    # x86 `ubuntu-22.04` because (a) the libdbus / sources patching dance
    # is already tested there, and (b) cross-compile aarch64→armhf has
    # the same complexity as x86→armhf with no payoff.
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        # aarch64 is split into three CPU-tuned variants so each Pi runs
        # code matched to its microarchitecture. The runtime picker script
        # (pi-gen-sources/.../files/sentryusb-pick-binary) selects the
        # right one at boot based on /proc/cpuinfo:
        #   * a76 → Pi 5 (Cortex-A76, ARMv8.2 with LSE atomics)
        #   * a72 → Pi 4, Radxa ROCK 4C+ perf cluster (Cortex-A72)
        #   * a53 → Pi 3, Pi Zero 2 W, Allwinner H618 boards (Cortex-A53)
        # The cpu field is consumed via the RUSTFLAGS env in the build step.
        include:
          - name: ARM64 a53 (Pi 3 / Pi Zero 2 W / Allwinner H618)
            runs_on: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            cpu: cortex-a53
            linker: cc
            gcc: ""
            artifact_suffix: linux-arm64-a53
          - name: ARM64 a72 (Pi 4 / Radxa ROCK 4C+)
            runs_on: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            cpu: cortex-a72
            linker: cc
            gcc: ""
            artifact_suffix: linux-arm64-a72
          - name: ARM64 a76 (Pi 5)
            runs_on: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            cpu: cortex-a76
            linker: cc
            gcc: ""
            artifact_suffix: linux-arm64-a76
          - name: ARMv7 (Pi 2/3/Zero2W 32-bit)
            runs_on: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            cpu: cortex-a7
            linker: arm-linux-gnueabihf-gcc
            gcc: gcc-arm-linux-gnueabihf
            artifact_suffix: linux-armv7
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          # Two install paths depending on whether the host matches the
          # target:
          #
          #   1. aarch64-* targets on `ubuntu-22.04-arm` → NATIVE build.
          #      Just install the basic build tools + libdbus host arch.
          #      No foreign architectures, no cross-toolchain, no
          #      sources patching.
          #
          #   2. armv7-* / arm-* targets on `ubuntu-22.04` (x86) →
          #      CROSS-compile. The default Ubuntu sources are x86-only,
          #      so we wholesale-rewrite sources.list to put amd64,i386
          #      on archive.ubuntu.com and arm64,armhf on
          #      ports.ubuntu.com (the only mirror that serves them).
          #      Then enable foreign archs + install cross gcc + the
          #      target-arch libdbus headers.
          case "${{ matrix.target }}" in
            aarch64-*)
              # Native build path.
              sudo apt-get update -qq
              sudo apt-get install -y -qq \
                brotli mold pkg-config libdbus-1-dev
              ;;
            armv7-*|arm-*)
              # Cross-compile path (x86 host → 32-bit ARM target).
              UBUNTU_CODENAME=$(lsb_release -cs)
              echo "Ubuntu codename: $UBUNTU_CODENAME"
              # Wipe any existing sources so a stale [arch=] line on the
              # runner image doesn't smuggle in a 404-bound fetch.
              sudo rm -f /etc/apt/sources.list.d/ubuntu.sources
              sudo tee /etc/apt/sources.list >/dev/null <<EOF
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu/ ${UBUNTU_CODENAME} main restricted universe multiverse
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu/ ${UBUNTU_CODENAME}-updates main restricted universe multiverse
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu/ ${UBUNTU_CODENAME}-backports main restricted universe multiverse
          deb [arch=amd64,i386] http://security.ubuntu.com/ubuntu/ ${UBUNTU_CODENAME}-security main restricted universe multiverse
          EOF
              sudo tee /etc/apt/sources.list.d/ports.list >/dev/null <<EOF
          deb [arch=arm64,armhf] http://ports.ubuntu.com/ubuntu-ports/ ${UBUNTU_CODENAME} main restricted universe multiverse
          deb [arch=arm64,armhf] http://ports.ubuntu.com/ubuntu-ports/ ${UBUNTU_CODENAME}-updates main restricted universe multiverse
          deb [arch=arm64,armhf] http://ports.ubuntu.com/ubuntu-ports/ ${UBUNTU_CODENAME}-security main restricted universe multiverse
          EOF
              sudo dpkg --add-architecture armhf
              sudo apt-get update -qq
              sudo apt-get install -y -qq \
                ${{ matrix.gcc }} brotli mold pkg-config \
                libdbus-1-dev libdbus-1-dev:armhf
              ;;
          esac

      - name: Configure pkg-config for cross-compile
        # Only needed on cross builds — native aarch64 uses the system
        # libdbus and pkg-config defaults work as-is.
        if: startsWith(matrix.target, 'armv7-') || startsWith(matrix.target, 'arm-')
        run: |
          # pkg-config needs to be pointed at the target arch's .pc
          # directory AND told that cross-compilation is OK (default
          # refuses, on the theory that mixing host + target libs causes
          # link-time disasters — which is exactly why we installed
          # libdbus-1-dev:armhf separately above).
          echo "PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Invalidate the target cache whenever Cargo.lock OR the inputs
          # to the embedded frontend change. rust-embed's rerun-if-changed
          # is unreliable across cache restores, so any change that ends up
          # in crates/sentryusb/static must force a clean cargo rebuild.
          # The cpu suffix is part of the key because aarch64-a53 /-a72 /-a76
          # all share the same target triple but produce distinct binaries
          # (different RUSTFLAGS), so they must NOT share a target/ dir.
          # runner.arch is in the key because the aarch64 jobs run on
          # ARM-native runners while armv7/armv6 stay on x86 cross — the
          # cached build artifacts are host-arch-specific and must not
          # be reused across hosts.
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ matrix.target }}-${{ matrix.cpu }}-${{ hashFiles('**/Cargo.lock', 'web/src/**', 'web/public/**', 'web/package-lock.json', 'web/package.json', 'web/index.html', 'web/vite.config.*', 'web/tsconfig*.json') }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          set -e
          cd web
          npm ci
          npm run build
          cd ..
          # Verify the build actually produced an HTML entry point. If
          # it didn't, refuse to continue rather than ship a binary with
          # an empty embedded UI.
          if [ ! -s "web/dist/index.html" ]; then
            echo "::error::web/dist/index.html missing or empty after npm run build"
            exit 1
          fi
          rm -rf crates/sentryusb/static
          cp -r web/dist crates/sentryusb/static
          # Sanity-check the embedded dir before handing off to cargo.
          if [ ! -s "crates/sentryusb/static/index.html" ] || [ -z "$(ls -A crates/sentryusb/static/assets 2>/dev/null)" ]; then
            echo "::error::crates/sentryusb/static is empty or missing assets after copy"
            exit 1
          fi
          # Pre-compress text-like assets so embed.rs can serve raw .br /
          # .gz bytes without burning per-request CPU on the Pi Zero 2W.
          # Skips already-compressed formats (woff2, png, jpg, ico) and
          # files under 1 KB where compression isn't worth the binary
          # bloat.
          PRECOMP=0
          while IFS= read -r -d '' f; do
            case "$f" in
              *.br|*.gz|*.woff2|*.png|*.jpg|*.jpeg|*.webp|*.ico|*.gif|*.mp4|*.mp3|*.zip) continue ;;
            esac
            SIZE=$(wc -c < "$f")
            if [ "$SIZE" -lt 1024 ]; then continue; fi
            gzip -9 -k -f "$f"
            brotli -q 11 --keep --force "$f"
            PRECOMP=$((PRECOMP + 1))
          done < <(find crates/sentryusb/static -type f -print0)
          echo "Frontend rebuilt; embedded $(ls crates/sentryusb/static/assets | wc -l) asset(s); pre-compressed $PRECOMP file(s)"

      - name: Validate Cargo.lock
        # cargo fetch resolves the lockfile against Cargo.toml and exits
        # non-zero if Cargo.lock is genuinely broken. This catches lockfile
        # corruption before the much slower cargo build step.
        run: cargo fetch --target ${{ matrix.target }}

      - name: Build release binaries (sentryusb + telemetry sampler)
        # RUSTFLAGS overrides the per-target rustflags in .cargo/config.toml
        # so each aarch64 matrix entry produces a binary tuned to its
        # specific Cortex-A microarchitecture.
        #
        # `mold -run` wraps the build so mold intercepts every linker
        # invocation in the subprocess tree. Used on aarch64 jobs
        # (where the build is now native on ubuntu-22.04-arm) but
        # skipped on armv7 because mold 1.x on Ubuntu 22.04 doesn't
        # support the 32-bit ARM `armelf_linux_eabi` emulation. armv7
        # keeps GNU ld; the aarch64 trio dominates total CI wall-clock
        # so the bulk of the link-time win still lands.
        run: |
          if [ -n "${{ matrix.cpu }}" ]; then
              export RUSTFLAGS="-C target-cpu=${{ matrix.cpu }}"
          fi
          case "${{ matrix.target }}" in
            aarch64-*) BUILD_WRAPPER="mold -run" ;;
            *)         BUILD_WRAPPER="" ;;
          esac
          $BUILD_WRAPPER cargo build --release --target ${{ matrix.target }} -p sentryusb
          $BUILD_WRAPPER cargo build --release --target ${{ matrix.target }} -p sentryusb-tesla-telemetry
          # One-shot CLI used by run/awake_start to issue keep-awake
          # actions over BLE (replaces tesla-control shell-outs).
          $BUILD_WRAPPER cargo build --release --target ${{ matrix.target }} -p sentryusb-tesla-ble --bin sentryusb-ble-action
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker }}

      - name: Package binaries
        # Both artifacts use the same `artifact_suffix` so the in-app
        # updater (update.rs) and the picker script can fetch them via a
        # predictable URL pattern: sentryusb-${suffix},
        # sentryusb-tesla-telemetry-${suffix}.
        #
        # The a72 job ALSO uploads under the legacy unsuffixed name
        # (sentryusb-linux-arm64 etc.) so pre-multi-binary installs whose
        # in-app updater still asks for the old URL keep working — they get
        # the a72-tuned binary, which runs correctly on every aarch64 Pi.
        # The user opts into per-CPU tuning by re-running install-pi.sh.
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/sentryusb release/sentryusb-${{ matrix.artifact_suffix }}
          cp target/${{ matrix.target }}/release/sentryusb-tesla-telemetry release/sentryusb-tesla-telemetry-${{ matrix.artifact_suffix }}
          cp target/${{ matrix.target }}/release/sentryusb-ble-action release/sentryusb-ble-action-${{ matrix.artifact_suffix }}
          if [ "${{ matrix.artifact_suffix }}" = "linux-arm64-a72" ]; then
              cp target/${{ matrix.target }}/release/sentryusb release/sentryusb-linux-arm64
              cp target/${{ matrix.target }}/release/sentryusb-tesla-telemetry release/sentryusb-tesla-telemetry-linux-arm64
              cp target/${{ matrix.target }}/release/sentryusb-ble-action release/sentryusb-ble-action-linux-arm64
          fi
          ls -lh release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sentryusb-${{ matrix.artifact_suffix }}-bundle
          path: release/*

  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install bluez build deps
        # `bluer`/`btleplug` (used by crates/tesla_ble) need libdbus-1
        # headers + pkg-config to compile. Without these `cargo test
        # --workspace` fails to build libdbus-sys.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libdbus-1-dev pkg-config
      - name: Ensure static dir exists
        run: |
          mkdir -p crates/sentryusb/static
          echo '<!DOCTYPE html><html><body>test</body></html>' > crates/sentryusb/static/index.html
      - name: Run tests
        run: cargo test --workspace

  release:
    name: Create Release
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: release/
          merge-multiple: true

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
